# .github/workflows/generate-portfolio.yml
name: Generar Portafolio Automáticamente

on:
  push:
    branches: [ master ]
    paths:
      - 'projects/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-portfolio:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 🔨 Generar projects-data.json
        run: node build.js
      
      - name: 📸 Mostrar contenido del JSON generado
        run: |
          echo "Contenido de projects-data.json:"
          cat projects-data.json | jq '.' || cat projects-data.json
      
      - name: 🔍 Verificar cambios
        id: verify-changes
        run: |
          if git diff --quiet projects-data.json; then
            echo "No hay cambios en projects-data.json"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Se detectaron cambios en projects-data.json"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Cambios detectados:"
            git diff projects-data.json
          fi
      
      - name: 📤 Hacer commit de los cambios
        if: steps.verify-changes.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add projects-data.json
          git commit -m "🤖 Actualización automática: projects-data.json"
          git push